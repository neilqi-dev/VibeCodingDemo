<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP3 Audio Player with Waveform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>MP3 Audio Player with Waveform</h1>
        
        <div class="upload-section">
            <input type="file" id="fileInput" accept="audio/mpeg" style="display: none;">
            <div id="dropZone" class="drop-zone">
                <p>Drag and drop an MP3 file here, or click to select</p>
            </div>
        </div>
        
        <div class="player-section">
            <canvas id="waveformCanvas" width="800" height="200"></canvas>
            
            <div class="controls">
                <button id="playPauseBtn">Play</button>
                <button id="repeatBtn">Repeat</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
